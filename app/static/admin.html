<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Admin</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>🎟 Nexus Marketplace</h1>
    <nav>
      <a href="/">Shop</a> &nbsp;|&nbsp;
      <a href="/admin" class="active">Admin</a>
    </nav>
  </header>

  <main>
    <h2>Admin Panel</h2>
    <div id="flash"></div>

    <!-- Auth token entry -->
    <div class="card" id="auth-section">
      <h3>Authentication</h3>
      <label for="token">Admin Bearer Token</label>
      <input type="password" id="token" placeholder="Enter admin token…" />
      <button class="btn btn-primary" onclick="setToken()">Set Token & Load</button>
    </div>

    <!-- Create coupon form -->
    <div class="card">
      <h3>Create Coupon</h3>
      <label for="c-name">Name</label>
      <input id="c-name" placeholder="Amazon $100 Coupon" />

      <label for="c-desc">Description</label>
      <input id="c-desc" placeholder="Gift card redeemable on Amazon" />

      <label for="c-image">Image URL</label>
      <input id="c-image" placeholder="https://…" />

      <div class="form-row">
        <div>
          <label for="c-cost">Cost Price ($)</label>
          <input id="c-cost" type="number" step="0.01" min="0" placeholder="80.00" />
        </div>
        <div>
          <label for="c-margin">Margin (%)</label>
          <input id="c-margin" type="number" step="0.01" min="0" placeholder="25" />
        </div>
      </div>

      <label for="c-vtype">Value Type</label>
      <select id="c-vtype">
        <option value="STRING">STRING (code / barcode text)</option>
        <option value="IMAGE">IMAGE (URL or data-URI)</option>
      </select>

      <label for="c-value">Coupon Value (the secret redeemable asset)</label>
      <input id="c-value" placeholder="ABCD-1234 or https://…/qr.png" />

      <button class="btn btn-primary" onclick="createCoupon()">Create Coupon</button>
    </div>

    <!-- Products table -->
    <div class="card">
      <h3>All Products <button class="btn btn-primary" style="float:right;font-size:.8rem;padding:.25rem .75rem" onclick="loadProducts()">↻ Refresh</button></h3>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Cost</th><th>Margin</th><th>Min Price</th>
              <th>Value</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="7" style="color:#666">Set your token above and click Load.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    let adminToken = '';
    const flash = document.getElementById('flash');

    function showFlash(msg, type='error') {
      flash.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => flash.innerHTML = '', 6000);
    }

    function setToken() {
      adminToken = document.getElementById('token').value.trim();
      if (!adminToken) { showFlash('Please enter a token.'); return; }
      loadProducts();
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' };
    }

    async function loadProducts() {
      if (!adminToken) { showFlash('Set a token first.'); return; }
      const tbody = document.getElementById('products-tbody');
      try {
        const res = await fetch('/api/admin/products', { headers: authHeaders() });
        if (res.status === 401) { showFlash('Invalid token.'); return; }
        const products = await res.json();
        if (products.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="color:#666">No products yet.</td></tr>';
          return;
        }
        tbody.innerHTML = products.map(p => `
          <tr>
            <td>${escHtml(p.name)}<br><small style="color:#999">${p.id.slice(0,8)}…</small></td>
            <td>$${Number(p.cost_price).toFixed(2)}</td>
            <td>${Number(p.margin_percentage).toFixed(2)}%</td>
            <td><strong>$${Number(p.minimum_sell_price).toFixed(2)}</strong></td>
            <td style="font-family:monospace;font-size:.8rem">${escHtml(p.value)}</td>
            <td><span class="badge badge-${p.is_sold ? 'sold':'unsold'}">${p.is_sold ? 'SOLD':'Available'}</span></td>
            <td>
              ${p.is_sold ? '' : `<button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Delete</button>`}
            </td>
          </tr>
        `).join('');
      } catch {
        tbody.innerHTML = '<tr><td colspan="7" class="alert alert-error">Failed to load.</td></tr>';
      }
    }

    async function createCoupon() {
      if (!adminToken) { showFlash('Set a token first.'); return; }
      const payload = {
        name: document.getElementById('c-name').value.trim(),
        description: document.getElementById('c-desc').value.trim(),
        image_url: document.getElementById('c-image').value.trim(),
        cost_price: document.getElementById('c-cost').value,
        margin_percentage: document.getElementById('c-margin').value,
        value_type: document.getElementById('c-vtype').value,
        value: document.getElementById('c-value').value.trim(),
      };
      try {
        const res = await fetch('/api/admin/products', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload),
        });
        const body = await res.json();
        if (!res.ok) {
          showFlash(`Error: ${body.message || body.error_code}`);
          return;
        }
        showFlash(`Coupon created! Min sell price: $${Number(body.minimum_sell_price).toFixed(2)}`, 'success');
        // Clear form.
        ['c-name','c-desc','c-image','c-cost','c-margin','c-value'].forEach(id => {
          document.getElementById(id).value = '';
        });
        loadProducts();
      } catch {
        showFlash('Network error.');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      const res = await fetch(`/api/admin/products/${id}`, {
        method: 'DELETE', headers: authHeaders(),
      });
      if (res.status === 204) {
        showFlash('Deleted.', 'success');
        loadProducts();
      } else {
        const body = await res.json();
        showFlash(`Error: ${body.message || body.error_code}`);
      }
    }

    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
