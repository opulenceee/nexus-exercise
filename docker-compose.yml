# Modern Compose: no top-level `version:` key needed.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Postgres is intentionally NOT published to the host: the app reaches it
    # over the internal Compose network (db:5432). Not binding host 5432 avoids
    # clashing with any Postgres the reviewer already runs locally.
    # To inspect it manually:  docker compose exec db psql -U nexus -d nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # The app waits for this to go healthy before starting.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      # Host port is configurable (APP_PORT, default 8000) to avoid clashes.
      - "${APP_PORT:-8000}:8000"

volumes:
  pgdata:
